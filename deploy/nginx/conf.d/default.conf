upstream legendai_api {
    server api:8000;
}

upstream legendai_frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    # If you bind a real domain and certs, enable forced HTTPS.
    # return 301 https://$host$request_uri;

    client_max_body_size 2g;

    location /api/ {
        proxy_pass http://legendai_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://legendai_frontend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

