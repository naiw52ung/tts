services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: legendai
      POSTGRES_USER: legendai
      POSTGRES_PASSWORD: legendai
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: ./backend
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - legendai_storage:/data/storage
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build: ./backend
    env_file:
      - .env
    command: celery -A app.worker.tasks worker --loglevel=info
    volumes:
      - ./backend:/app
      - legendai_storage:/data/storage
    depends_on:
      - postgres
      - redis

  frontend:
    image: node:22
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pg_data:
  legendai_storage:
