name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          set -euo pipefail
          HOST="${{ secrets.SERVER_HOST }}"
          USER_NAME="${{ secrets.SERVER_USER }}"
          PORT="${{ secrets.SERVER_PORT }}"
          if [ -z "$PORT" ]; then PORT=22; fi

          if [ -z "$HOST" ]; then
            echo "SERVER_HOST is empty"
            exit 1
          fi
          if [ -z "$USER_NAME" ]; then
            echo "SERVER_USER is empty"
            exit 1
          fi
          if [ -z "${{ secrets.SERVER_SSH_KEY }}" ]; then
            echo "SERVER_SSH_KEY is empty"
            exit 1
          fi

          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          set -euo pipefail
          HOST="${{ secrets.SERVER_HOST }}"
          USER_NAME="${{ secrets.SERVER_USER }}"
          DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
          PORT="${{ secrets.SERVER_PORT }}"
          if [ -z "$PORT" ]; then PORT=22; fi

          if [ -z "$DEPLOY_PATH" ]; then
            echo "DEPLOY_PATH is empty"
            exit 1
          fi

          tar --exclude='.git' -czf /tmp/deploy.tar.gz .
          ssh -p "$PORT" "$USER_NAME@$HOST" "mkdir -p \"$DEPLOY_PATH\""
          scp -P "$PORT" /tmp/deploy.tar.gz "$USER_NAME@$HOST:/tmp/deploy.tar.gz"

          ssh -p "$PORT" "$USER_NAME@$HOST" << 'EOF'
          set -euo pipefail
          cd "${{ secrets.DEPLOY_PATH }}"
          tar -xzf /tmp/deploy.tar.gz -C "${{ secrets.DEPLOY_PATH }}"
          rm -f /tmp/deploy.tar.gz

          chmod +x scripts/backup_prod.sh scripts/deploy_prod.sh
          echo "[pre-deploy] running backup_prod.sh"
          ./scripts/backup_prod.sh

          ./scripts/deploy_prod.sh
          EOF

          rm -f /tmp/deploy.tar.gz

      - name: Show recent backups on failure
        if: failure()
        run: |
          set -euo pipefail
          HOST="${{ secrets.SERVER_HOST }}"
          USER_NAME="${{ secrets.SERVER_USER }}"
          DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
          PORT="${{ secrets.SERVER_PORT }}"
          if [ -z "$PORT" ]; then PORT=22; fi

          echo "[failure-debug] latest backups under $DEPLOY_PATH/backups"
          ssh -p "$PORT" "$USER_NAME@$HOST" "ls -1dt \"$DEPLOY_PATH\"/backups/* 2>/dev/null | head -n 3 || true"
